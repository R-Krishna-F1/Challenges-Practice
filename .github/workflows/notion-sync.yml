name: Sync Notion to GitHub

on:
  schedule:
    - cron: "0 2 * * *"   # Runs every day at 2:00 AM UTC — change as needed
  workflow_dispatch:        # Lets you also trigger it manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit and push files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run Notion sync
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          OUTPUT_DIR: ./docs         # All synced files go into /docs folder in your repo
        run: node sync.js

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: sync Notion pages [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
